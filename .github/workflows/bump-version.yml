name: Bump Version on Release Branch

on:
  push:
    branches: [release]
    paths-ignore:
      - 'pyproject.toml'  # Avoid infinite loop

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for pushing version bump commit

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get last commit message
        id: commit_msg
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "message=$MSG" >> $GITHUB_OUTPUT

      - name: Determine bump type
        id: bump_type
        run: |
          MSG="${{ steps.commit_msg.outputs.message }}"
          if echo "$MSG" | grep -qE "^BREAKING[ :]"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qE "^feat[ :]"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qE "^(fix|bug|patch)[ :]"; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT  # Default to patch
          fi
          echo "Bump type: ${{ steps.bump_type.outputs.type }}"

      - name: Bump version
        id: bump_version
        run: |
          pip install tomli tomli-w
          python << 'EOF'
          import tomli
          import tomli_w
          import sys

          bump_type = "${{ steps.bump_type.outputs.type }}"

          with open("pyproject.toml", "rb") as f:
              data = tomli.load(f)

          version = data["project"]["version"]
          major, minor, patch = map(int, version.split("."))

          if bump_type == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump_type == "minor":
              minor += 1
              patch = 0
          else:  # patch
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          data["project"]["version"] = new_version

          with open("pyproject.toml", "wb") as f:
              tomli_w.dump(data, f)

          print(f"Bumped version: {version} -> {new_version}")
          print(f"new_version={new_version}")
          EOF

          NEW_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new_version }} [skip ci]"
          git push origin release
